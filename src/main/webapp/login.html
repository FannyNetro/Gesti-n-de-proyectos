<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | VG Tech</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --navy: #0d1f3c;
            --navy-mid: #162d52;
            --teal: #3d8a85;
            --mustard: #c9a84c;
            --bg: #f0f2f5;
            --surface: #ffffff;
            --text: #1a2b45;
            --text-muted: #6b7a94;
            --border: #dbe1ea;
            --err-bg: #fef3f2;
            --err-bd: #f4a79d;
            --err-tx: #b42318;
            --radius: 14px;
            --shadow: 0 8px 32px rgba(13, 31, 60, .12);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            /* Imagen de construcción con degradado superpuesto */
            background:
                linear-gradient(135deg,
                    rgba(13, 31, 60, 0.82) 0%,
                    rgba(13, 31, 60, 0.55) 45%,
                    rgba(61, 138, 133, 0.35) 100%),
                url('images/construction_bg.png') center center / cover no-repeat;
            background-attachment: fixed;
        }

        /* Degradado sutil desde abajo para extra legibilidad */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(to top,
                    rgba(13, 31, 60, 0.45) 0%,
                    transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        /* Marca */
        .brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-icon {
            display: inline-block;
            margin-bottom: 10px;
        }

        .brand p {
            color: #ffffff;
            font-size: .875rem;
            font-weight: 500;
            margin-top: 6px;
            text-shadow: 0 1px 6px rgba(0, 0, 0, .55);
            letter-spacing: .2px;
        }

        /* Tarjeta */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 36px;
            box-shadow: var(--shadow);
        }

        .card::before {
            content: '';
            display: block;
            width: 44px;
            height: 3px;
            background: var(--mustard);
            border-radius: 99px;
            margin-bottom: 22px;
        }

        .card h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 4px;
        }

        .card .subtitle {
            color: var(--text-muted);
            font-size: .855rem;
            margin-bottom: 28px;
        }

        .badge {
            display: inline-block;
            background: rgba(61, 138, 133, .1);
            border: 1px solid rgba(61, 138, 133, .25);
            color: var(--teal);
            border-radius: 99px;
            padding: 2px 11px;
            font-size: .78rem;
            font-weight: 700;
        }

        /* Alerta de error */
        .error-alert {
            background: var(--err-bg);
            border: 1px solid var(--err-bd);
            color: var(--err-tx);
            border-radius: 8px;
            padding: 11px 14px;
            font-size: .855rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 9px;
        }

        /* Campos */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: .75rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            font-size: .97rem;
            font-family: inherit;
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }

        input:focus {
            background: #fff;
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(61, 138, 133, .14);
        }

        input::placeholder {
            color: #b0bac7;
        }

        /* Botón */
        .btn-submit {
            width: 100%;
            padding: 13px;
            background: var(--navy);
            color: #fff;
            border: none;
            border-radius: 9px;
            font-size: .97rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            margin-top: 6px;
            transition: background .2s, transform .15s, box-shadow .2s;
            letter-spacing: .3px;
            box-shadow: 0 4px 14px rgba(13, 31, 60, .22);
        }

        .btn-submit:hover {
            background: var(--navy-mid);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Footer card */
        .card-footer {
            text-align: center;
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: .8rem;
        }

        .security-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: .78rem;
        }

        .security-note .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--teal);
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div class="login-wrapper">

        <div class="brand">
            <div class="brand-icon">
                <img src="images/vgtech_logo.png" alt="VG Tech" style="height:90px;width:auto;">
            </div>
            <p>Sistema de Gestión Inmobiliaria</p>
        </div>

        <div class="card">
            <h2>Iniciar Sesión</h2>
            <p class="subtitle">
                Acceso exclusivo para <span class="badge">Admin de RH</span>
            </p>

            <!--
            ERROR → el Servlet redirige a /login?error=... al fallar.
            LoginServlet.java → redirigirConError() codifica el mensaje en la URL.
        -->
            <div id="errorAlert" class="error-alert" style="display:none;">
                <span>⚠️</span><span id="errorMsg"></span>
            </div>

            <!--
            FORMULARIO → POST /login
            Procesado por: LoginServlet.java
            Credenciales simuladas: admin_rh / 1234
            req.getParameter("usuario")
            req.getParameter("password")
        -->
            <form method="POST" action="login" id="loginForm">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario" required
                        autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required
                        autocomplete="current-password">
                </div>
                <button type="submit" class="btn-submit" id="btnLogin">Iniciar Sesión</button>
            </form>

            <div class="card-footer">¿Olvidaste tu contraseña? Contacta a soporte TI.</div>
        </div>

        <div class="security-note">
            <span class="dot"></span>Conexión segura &nbsp;·&nbsp; VG Tech &copy; 2026
        </div>
    </div>

    <script>
        (function () {
            var p = new URLSearchParams(window.location.search);
            var e = p.get('error');
            if (e) {
                document.getElementById('errorAlert').style.display = 'flex';
                document.getElementById('errorMsg').textContent = decodeURIComponent(e);
            }
        })();
        document.getElementById('loginForm').addEventListener('submit', function () {
            var b = document.getElementById('btnLogin');
            b.textContent = 'Verificando...';
            b.disabled = true;
        });
    </script>
</body>

</html>
