<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel RH — Empleados | VG Tech</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ── Paleta VG Tech ─────────────────────────────────────── */
        :root {
            --navy: #0d1f3c;
            --navy-mid: #162d52;
            --navy-item: #1a3464;
            --navy-item-h: #1f3e74;
            --teal: #3d8a85;
            --teal-h: #2f6e6a;
            --teal-light: rgba(61, 138, 133, .12);
            --mustard: #c9a84c;
            --bg: #f0f2f5;
            --surface: #ffffff;
            --text: #1a2b45;
            --text-muted: #6b7a94;
            --border: #dbe1ea;
            --shadow: 0 2px 16px rgba(13, 31, 60, .09);
            --radius: 12px;
            --sidebar-w: 240px;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            /* Imagen de construcci\u00f3n con degradado superpuesto */
            background:
                linear-gradient(135deg,
                    rgba(13, 31, 60, 0.78) 0%,
                    rgba(13, 31, 60, 0.50) 40%,
                    rgba(61, 138, 133, 0.30) 100%),
                url('images/construction_bg.png') center center / cover no-repeat fixed;
        }

        /* ════════════════════════════════════════════
           SIDEBAR
        ════════════════════════════════════════════ */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--navy);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        /* Marca VG Tech */
        .sidebar-brand {
            padding: 26px 22px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, .07);
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 11px;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: var(--navy-item);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* Toque mostaza en el ícono */
        .logo-icon::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 10px;
            height: 10px;
            background: var(--mustard);
            border-radius: 3px 0 0 0;
        }

        .logo-icon span {
            position: relative;
            z-index: 1;
        }

        .brand-name {
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -.3px;
        }

        .brand-name em {
            color: var(--teal);
            font-style: normal;
        }

        .brand-sub {
            font-size: .72rem;
            color: rgba(255, 255, 255, .35);
            margin-top: 2px;
        }

        /* Menú lateral */
        .sidebar-nav {
            padding: 20px 14px;
            flex: 1;
        }

        .nav-label {
            font-size: .68rem;
            font-weight: 700;
            color: rgba(255, 255, 255, .3);
            text-transform: uppercase;
            letter-spacing: .8px;
            padding: 0 10px;
            margin-bottom: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 11px 14px;
            border-radius: 8px;
            color: rgba(255, 255, 255, .72);
            text-decoration: none;
            font-size: .9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background .18s, color .18s;
            margin-bottom: 3px;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }

        .nav-item:hover {
            background: var(--navy-item-h);
            color: #fff;
        }

        /* Ítem activo — resaltado con franja teal */
        .nav-item.active {
            background: var(--teal-light);
            color: #5dc9c4;
            border-left: 3px solid var(--teal);
            padding-left: 11px;
        }

        .nav-icon {
            font-size: 15px;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        /* Cerrar sesión al fondo del sidebar */
        .sidebar-footer {
            padding: 14px;
            border-top: 1px solid rgba(255, 255, 255, .07);
        }

        .btn-logout {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 11px 14px;
            border-radius: 8px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, .1);
            color: rgba(255, 255, 255, .5);
            font-size: .875rem;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: background .18s, color .18s, border-color .18s;
        }

        .btn-logout:hover {
            background: rgba(201, 168, 76, .1);
            border-color: rgba(201, 168, 76, .3);
            color: var(--mustard);
        }

        /* ════════════════════════════════════════════
           ÁREA PRINCIPAL
        ════════════════════════════════════════════ */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: rgba(240, 242, 245, 0.82);
            backdrop-filter: blur(2px);
        }

        /* Topbar */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 62px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar-title {
            font-size: .95rem;
            font-weight: 600;
            color: var(--text);
        }

        .topbar-title span {
            color: var(--text-muted);
            font-weight: 400;
        }

        .topbar-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--teal-light);
            border: 1px solid rgba(61, 138, 133, .2);
            color: var(--teal);
            border-radius: 99px;
            padding: 5px 14px;
            font-size: .8rem;
            font-weight: 700;
        }

        /* Contenido */
        .main-content {
            padding: 36px 40px;
            max-width: 860px;
        }

        .page-header {
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-size: 1.55rem;
            font-weight: 800;
            color: var(--navy);
            letter-spacing: -.4px;
        }

        .page-header p {
            color: var(--mustard);
            font-size: .95rem;
            font-weight: 600;
            margin-top: 5px;
        }

        .page-header::after {
            content: '';
            display: block;
            width: 36px;
            height: 3px;
            background: var(--mustard);
            border-radius: 99px;
            margin-top: 12px;
        }

        /* ── Tarjeta del formulario ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .card-header {
            padding: 22px 28px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 13px;
        }

        .card-icon {
            width: 38px;
            height: 38px;
            background: var(--teal-light);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
        }

        .card-header h2 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--navy);
        }

        .card-header p {
            color: var(--text-muted);
            font-size: .825rem;
            margin-top: 2px;
        }

        .card-body {
            padding: 28px;
        }

        /* Grid del formulario */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        label {
            font-size: .75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        input[type="text"],
        input[type="tel"],
        input[type="number"],
        input[type="file"],
        select {
            width: 100%;
            padding: 11px 15px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: .95rem;
            font-family: inherit;
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }

        input:focus,
        select:focus {
            background: #fff;
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(61, 138, 133, .13);
        }

        input::placeholder {
            color: #b0bac7;
        }

        select {
            cursor: pointer;
            appearance: auto;
        }



        /* Prefix en campo sueldo */
        .input-group {
            display: flex;
            align-items: stretch;
        }

        .input-prefix {
            background: var(--border);
            border: 1.5px solid var(--border);
            border-right: none;
            border-radius: 8px 0 0 8px;
            padding: 0 13px;
            display: flex;
            align-items: center;
            font-size: .9rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .input-group input {
            border-radius: 0 8px 8px 0;
            flex: 1;
        }

        /* Separador */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 26px 0;
        }

        /* Botones */
        .form-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 8px;
            font-size: .92rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: background .2s, transform .15s, box-shadow .2s;
            letter-spacing: .2px;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Botón guardar → teal */
        .btn-primary {
            background: var(--teal);
            color: #fff;
            box-shadow: 0 4px 12px rgba(61, 138, 133, .3);
        }

        .btn-primary:hover {
            background: var(--teal-h);
            box-shadow: 0 6px 18px rgba(61, 138, 133, .38);
        }

        /* Botón limpiar → gris */
        .btn-secondary {
            background: var(--bg);
            color: var(--text-muted);
            border: 1.5px solid var(--border);
        }

        .btn-secondary:hover {
            background: #e2e6ed;
            color: var(--text);
        }

        /* Nota informativa */
        .info-note {
            margin-top: 22px;
            background: rgba(61, 138, 133, .07);
            border: 1px solid rgba(61, 138, 133, .2);
            color: #2f7570;
            border-radius: 8px;
            padding: 13px 16px;
            font-size: .845rem;
            line-height: 1.5;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        /* Aviso prototipo */
        .dev-hint {
            margin-top: 10px;
            background: rgba(201, 168, 76, .08);
            border: 1px dashed rgba(201, 168, 76, .35);
            color: #8c6e1f;
            border-radius: 8px;
            padding: 11px 16px;
            font-size: .82rem;
        }

        /* Responsive */
        @media (max-width: 680px) {
            .sidebar {
                width: 64px;
            }

            .brand-name,
            .brand-sub,
            .nav-item>span:last-child,
            .btn-logout>span:last-child,
            .nav-label {
                display: none;
            }

            .nav-item,
            .btn-logout {
                justify-content: center;
                padding: 12px;
            }

            .main-content {
                padding: 24px 16px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- ════════════════════════════════════════
     SIDEBAR
════════════════════════════════════════ -->
    <aside class="sidebar">

        <div class="sidebar-brand">
            <div style="background:#fff;border-radius:10px;padding:8px 10px;display:inline-block;margin-bottom:8px;">
                <img src="images/vgtech_logo.png" alt="VG Tech" style="height:44px;width:auto;display:block;">
            </div>
            <div class="brand-sub">Sistema inmobiliario</div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-label">Menú</div>

            <!--
            OPCIÓN 1 — Registro de Empleados (pantalla activa)
        -->
            <a href="dashboard_rh.html" class="nav-item active">
                <span class="nav-icon">👥</span>
                <span>Registro de Empleados</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <!--
            OPCIÓN 2 — Cerrar Sesión → GET /login → LoginServlet.doGet()
        -->
            <a href="login" class="btn-logout">
                <span>🔓</span>
                <span>Cerrar Sesión</span>
            </a>
        </div>

    </aside>

    <!-- ════════════════════════════════════════
     ÁREA PRINCIPAL
════════════════════════════════════════ -->
    <div class="main-area">

        <header class="topbar">
            <div class="topbar-title"><span>VG Tech / </span>Recursos Humanos</div>
            <div class="topbar-badge">👤 Admin RH</div>
        </header>

        <main class="main-content">

            <div class="page-header">
                <h1>Registro de Empleados</h1>
                <p>Alta de personal interno — Consultores, Supervisores y Administrativos</p>
            </div>

            <!-- Tarjeta con el formulario -->
            <div class="card">

                <div class="card-header">
                    <div class="card-icon">👤</div>
                    <div>
                        <h2>Nuevo Empleado</h2>
                        <p>Completa todos los campos para registrar al empleado</p>
                    </div>
                </div>

                <div class="card-body">
                    <!--
                    ╔═══════════════════════════════════════════════════════╗
                    ║  FORMULARIO → POST /empleados                         ║
                    ║  Procesado por: EmpleadoServlet.java                  ║
                    ║                                                       ║
                    ║  enctype="multipart/form-data" es obligatorio para    ║
                    ║  poder enviar el campo de foto (tipo file).           ║
                    ║                                                       ║
                    ║  Parámetros que lee el Servlet:                       ║
                    ║    req.getParameter("nombreCompleto")                 ║
                    ║    req.getParameter("direccion")                      ║
                    ║    req.getParameter("telefono")                       ║
                    ║    req.getParameter("puesto")                         ║
                    ║    req.getParameter("sueldo")                         ║
                    ║    req.getPart("foto")                                ║
                    ╚═══════════════════════════════════════════════════════╝
                -->
                    <form method="POST" action="empleados" enctype="multipart/form-data" id="empleadoForm"
                        onsubmit="return prepararEnvio()">
                        <div class="form-grid">

                            <!-- Nombre Completo -->
                            <div class="form-group full">
                                <label for="nombreCompleto">Nombre Completo *</label>
                                <input type="text" id="nombreCompleto" name="nombreCompleto"
                                    placeholder="Ej. María González Pérez" required maxlength="200">
                            </div>

                            <!-- Dirección -->
                            <div class="form-group full">
                                <label for="direccion">Dirección *</label>
                                <input type="text" id="direccion" name="direccion"
                                    placeholder="Ej. Av. Reforma 123, Col. Juárez, CDMX" required maxlength="300">
                            </div>

                            <!-- Teléfono -->
                            <div class="form-group">
                                <label for="telefono">Teléfono *</label>
                                <input type="tel" id="telefono" name="telefono" placeholder="Ej. (55) 1234-5678"
                                    required maxlength="15">
                            </div>

                            <!-- Puesto Asignado -->
                            <div class="form-group">
                                <label for="puesto">Puesto Asignado *</label>
                                <select id="puesto" name="puesto" required>
                                    <option value="" disabled selected>— Selecciona un puesto —</option>
                                    <option value="Consultor">Consultor</option>
                                    <option value="Supervisor">Supervisor</option>
                                    <option value="Administrativo">Administrativo</option>
                                </select>
                            </div>

                            <!-- Sueldo -->
                            <div class="form-group">
                                <label for="sueldo">Sueldo Mensual (MXN) *</label>
                                <div class="input-group">
                                    <span class="input-prefix">$</span>
                                    <input type="number" id="sueldo" name="sueldo" placeholder="Ej. 25000" required
                                        min="1" step="0.01">
                                </div>
                            </div>



                        </div><!-- /form-grid -->

                        <div class="divider"></div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" id="btnGuardar">
                                ✓ &nbsp;Guardar Empleado
                            </button>
                            <button type="reset" class="btn btn-secondary" onclick="resetBtn()">
                                Limpiar
                            </button>
                        </div>

                    </form>



                </div><!-- /card-body -->
            </div><!-- /card -->

        </main>
    </div><!-- /main-area -->

    <script>
        function prepararEnvio() {
            var btn = document.getElementById('btnGuardar');
            btn.textContent = '⏳  Guardando...';
            btn.disabled = true;
            return true;
        }
        function resetBtn() {
            var btn = document.getElementById('btnGuardar');
            btn.textContent = '✓ Guardar Empleado';
            btn.disabled = false;
        }
    </script>

</body>

</html>
